# Proxy CQR (GhostDocker / PMU / Harmonia) — incluir no void-frontend quando QUANTUM_UPSTREAM está definido.
# Variável ${QUANTUM_UPSTREAM} substituída no build (ex.: http://quantum-engine:8472).

location /cosmic/ {
    proxy_pass ${QUANTUM_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 180s;
}

location /pmu/ {
    proxy_pass ${QUANTUM_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_read_timeout 120s;
}

location ~ ^/quantum/(entropy|chsh|bell|pachner|bb84|spin|switch|theorems|heptary/simulate|lsc/) {
    proxy_pass ${QUANTUM_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_read_timeout 120s;
}
